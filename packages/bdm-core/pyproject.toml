[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bdm-core"
version = "0.1.0"
description = "Core cognitive architecture layers for Beautiful Deep Mind"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE.md" }
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]

[tool.hatch.build.targets.wheel]
packages = ["src/bdm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
